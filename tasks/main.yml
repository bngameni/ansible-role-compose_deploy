---
- name: "Install compose runtime packages"
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-docker
    state: present
    update_cache: true

- name: "Validate volume directory definitions"
  ansible.builtin.assert:
    that:
      - compose_deploy_volume_dir.path is string
      - compose_deploy_volume_dir.path | length > 0
      - compose_deploy_volume_dir.mode is not defined or compose_deploy_volume_dir.mode is string
    fail_msg: >-
      Each compose_deploy_volumes_dir item must define a non-empty path.
      mode is optional and must be a string when set.
  loop: "{{ compose_deploy_volumes_dir }}"
  loop_control:
    loop_var: compose_deploy_volume_dir
    label: "{{ compose_deploy_volume_dir.path | default('<missing path>') }}"

- name: "Validate compose project definitions"
  ansible.builtin.assert:
    that:
      - compose_deploy_project_definition.src is string
      - compose_deploy_project_definition.src | length > 0
      - compose_deploy_project_definition.dest is string
      - compose_deploy_project_definition.dest | length > 0
      - compose_deploy_project_definition.name is not defined or compose_deploy_project_definition.name is string
      - compose_deploy_project_definition.mode is not defined or compose_deploy_project_definition.mode is string
      - compose_deploy_project_definition.directory_mode is not defined or compose_deploy_project_definition.directory_mode is string
    fail_msg: >-
      Each compose_deploy_projects item must define non-empty src and dest values.
      name, mode, and directory_mode are optional and must be strings when set.
  loop: "{{ compose_deploy_projects }}"
  loop_control:
    loop_var: compose_deploy_project_definition
    label: "{{ compose_deploy_project_definition.dest | default('<missing dest>') }}"

- name: "Collect volume directories state"
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop: "{{ compose_deploy_volumes_dir }}"
  loop_control:
    label: "{{ item.path }}"
  register: _compose_deploy_volume_dirs_state
  when:
    - compose_deploy_volumes_dir | length > 0

- name: "Fail when a volume path exists and is not a directory"
  ansible.builtin.fail:
    msg: >-
      Volume path {{ item.item.path }} exists but is not a directory.
      Update compose_deploy_volumes_dir or remove the conflicting path.
  loop: "{{ _compose_deploy_volume_dirs_state.results }}"
  loop_control:
    label: "{{ item.item.path }}"
  when:
    - item.stat.exists
    - not item.stat.isdir

- name: "Create missing volumes for docker-compose service"
  ansible.builtin.file:
    path: "{{ item.item.path }}"
    state: directory
    mode: "{{ item.item.mode | default('0755') }}"
  loop: "{{ _compose_deploy_volume_dirs_state.results }}"
  loop_control:
    label: "{{ item.item.path }}"
  when: not item.stat.exists

- name: "Skip existing volume directories with a different mode"
  ansible.builtin.debug:
    msg: >-
      Volume path {{ item.item.path }} already exists with mode {{ item.stat.mode }}.
      Requested mode is {{ item.item.mode | default('0755') }}. Permissions are left unchanged.
  loop: "{{ _compose_deploy_volume_dirs_state.results }}"
  loop_control:
    label: "{{ item.item.path }}"
  when:
    - item.stat.exists
    - item.stat.isdir
    - (item.stat.mode | string | int(base=8)) != (item.item.mode | default('0755') | string | int(base=8))

- name: "Collect compose projects state"
  ansible.builtin.stat:
    path: "{{ item.dest }}"
  loop: "{{ compose_deploy_projects }}"
  loop_control:
    label: "{{ item.dest }}"
  register: _compose_deploy_projects_state
  when:
    - compose_deploy_projects | length > 0

- name: "Fail when a project destination exists and is not a directory"
  ansible.builtin.fail:
    msg: >-
      Project destination {{ item.item.dest }} exists but is not a directory.
      Update compose_deploy_projects or remove the conflicting path.
  loop: "{{ _compose_deploy_projects_state.results }}"
  loop_control:
    label: "{{ item.item.dest }}"
  when:
    - item.stat.exists
    - not item.stat.isdir

- name: "Create missing compose project directories"
  ansible.builtin.file:
    path: "{{ item.item.dest }}"
    state: directory
    mode: "{{ item.item.directory_mode | default('0755') }}"
  loop: "{{ _compose_deploy_projects_state.results }}"
  loop_control:
    label: "{{ item.item.dest }}"
  when:
    - not item.stat.exists

- name: "Deploy compose project content"
  ansible.builtin.include_tasks: project.yml
  loop: "{{ compose_deploy_projects }}"
  loop_control:
    loop_var: compose_deploy_project
    label: "{{ compose_deploy_project.dest }}"
  vars:
    _compose_deploy_project_source_dir: >-
      {{ lookup('ansible.builtin.first_found', {'files': [compose_deploy_project.src]}, errors='ignore') | default('', true) }}
    _compose_deploy_project_dest_dir: "{{ compose_deploy_project.dest | regex_replace('/?$', '') }}"
  when:
    - compose_deploy_projects | length > 0

- name: "Launch service with docker-compose using project directory"
  community.docker.docker_compose_v2:
    project_name: "{{ item.name | default(omit) }}"
    project_src: "{{ item.dest }}"
    state: present
  loop: "{{ compose_deploy_projects }}"
  loop_control:
    label: "{{ item.dest }}"
  when:
    - compose_deploy_projects | length > 0
