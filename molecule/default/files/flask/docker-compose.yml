---
services:
  db:
    image: postgres:18@sha256:a9abf4275f9e99bff8e6aed712b3b7dfec9cac1341bba01c1ffdfce9ff9fc34a
    restart: always
    environment:
      POSTGRES_PASSWORD: example
    volumes:
      - /app/db:/var/lib/postgresql/18/data
  adminer:
    image: adminer
    restart: always
  nginx:
    image: nginx
    restart: always
    ports:
      - "80:80/tcp"
    volumes:
      - type: bind
        source: /app/flask/nginx/nginx.conf
        target: /etc/nginx/conf.d/nginx.conf
